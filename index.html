<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Bahamian Voyage</title>
    <link rel="stylesheet" href="BV_Style.css">
</head>
<body>

    <div class="hero-bg">
        <img id="hero-image" src="Images/slide1.JPG">
    </div>

    <div class="overlay"></div>

    <div class="container">

		<img src="Images/logo.png" alt="Choose Your Bahamian Voyage" class="logo">
        
        <div class="card">

            <div id="story-text"></div>
            <div id="choices"></div>

            <button id="restart-btn" onclick="startGame()">Restart Voyage</button>
            <button onclick="skipTrack()">⏭️ Play Next</button>

	<div id="scene-image"></div>
	
	<audio id="bg-music"></audio>
	<button onclick="toggleMusic()">🔊 Toggle Junkanoo Music</button>
        </div>

    <footer class="site-footer">
        Made By Andrew Carey 2026
    </footer>

    <script src="BV_JS.js"></script>

</body>
</html>
